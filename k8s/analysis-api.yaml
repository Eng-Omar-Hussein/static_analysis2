apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analysis-api-argo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AhmedMaged77/static_analysis.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: analysis-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
