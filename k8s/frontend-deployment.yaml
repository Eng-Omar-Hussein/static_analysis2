apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f ../strelka/build/docker-compose-no-build.yaml --provider kubernetes convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: frontend
  name: frontend
  namespace: strelka
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f ../strelka/build/docker-compose-no-build.yaml --provider kubernetes convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: frontend
    spec:
      containers:
        - args:
            - strelka-frontend
          image: target/strelka-frontend:latest
          name: frontend
          ports:
            - containerPort: 57314
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/strelka
              name: frontend-cm0
              readOnly: true
            - mountPath: /var/log/strelka
              name: logs
      restartPolicy: Always
      volumes:
        - configMap:
            name: frontend-cm0
          name: frontend-cm0
        - name: logs
          persistentVolumeClaim:
            claimName: logs

---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose -f ../strelka/build/docker-compose-no-build.yaml --provider kubernetes convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: frontend
  name: frontend
  namespace: strelka
spec:
  ports:
    - name: "57314"
      port: 57314
      targetPort: 57314
  selector:
    io.kompose.service: frontend
